<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyanyian Aksara</title>
    <link rel="stylesheet" href="belajar.css">
    <style>
        /* Tambahan style dikit biar videonya rapi di tengah */
        .video-wrapper {
            max-width: 800px;
            margin: 30px auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            background-color: #000;
        }
        video {
            width: 100%;
            display: block;
        }
        .instruction-text {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: #333;
        }
    </style>
</head>
<body>
    <main class="page-shell">
        <header class="app-header">
            <a class="back-btn" href="index.html">&#8592; Mulang</a>
            <div class="title-block">
                <p class="eyebrow">Belajar jama nyani</p>
                <h1>Nyanyian Aksara Lampung</h1>
                <p class="subtitle">Tengis, ikuti, ghapal aksara sai-sai jama video di bah sinji.</p>
            </div>
        </header>

        <section class="panel">
            <p class="instruction-text">Pencet tombol play di bawah buat mulai nyanyi bareng!</p>
            
            <div class="video-wrapper">
                <video controls>
                    <source src="video nyanyi si gam.mp4" type="video/mp4">
                </video>
            </div>
        </section>
    </main>
</body>
</html>
